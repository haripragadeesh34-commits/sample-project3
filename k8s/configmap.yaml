apiVersion: v1
kind: ConfigMap
metadata:
  name: python-flask-app-config
  namespace: python-app
data:
  APP_ENV: production
  LOG_LEVEL: INFO
  WORKERS: "4"
  TIMEOUT: "120"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: python-flask-app-config-dev
  namespace: python-app
data:
  APP_ENV: development
  LOG_LEVEL: DEBUG
  WORKERS: "1"
  TIMEOUT: "30"
