apiVersion: v1
kind: Service
metadata:
  name: python-flask-app
  namespace: python-app
  labels:
    app: python-flask-app
  annotations:
    description: "Service for Python Flask Application"
spec:
  type: LoadBalancer
  selector:
    app: python-flask-app
  ports:
  - name: http
    port: 80
    targetPort: 5000
    protocol: TCP
  sessionAffinity: None
  # For internal cluster communication only, use ClusterIP:
  # type: ClusterIP
