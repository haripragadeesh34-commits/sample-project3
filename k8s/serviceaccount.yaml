apiVersion: v1
kind: ServiceAccount
metadata:
  name: python-flask-app
  namespace: python-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: python-flask-app
  namespace: python-app
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: python-flask-app
  namespace: python-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: python-flask-app
subjects:
- kind: ServiceAccount
  name: python-flask-app
  namespace: python-app
